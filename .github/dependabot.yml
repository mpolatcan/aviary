version: 2

updates:
  # Frontend (Vite, Tauri API, xterm.js, Biome, tsc)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Istanbul"
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend"]
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      tauri-frontend:
        patterns:
          - "@tauri-apps/*"
      xterm:
        patterns:
          - "@xterm/*"
      dev-tooling:
        patterns:
          - "@biomejs/*"
          - "typescript"
          - "vite"

  # Backend (Tauri, tokio, bollard)
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Istanbul"
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      tauri-backend:
        patterns:
          - "tauri"
          - "tauri-build"
          - "tauri-plugin-*"
      tokio-stack:
        patterns:
          - "tokio"
          - "tokio-util"
          - "futures-util"

  # Runtime image base (node:20-slim)
  - package-ecosystem: "docker"
    directory: "/runtime"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Istanbul"
    open-pull-requests-limit: 2
    labels: ["dependencies", "runtime-image"]
    commit-message:
      prefix: "deps"
      include: "scope"

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Istanbul"
    open-pull-requests-limit: 3
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci"
      include: "scope"
